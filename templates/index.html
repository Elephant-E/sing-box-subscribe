<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sing-box 订阅转换</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .main {
            width: 100%;
            max-width: 640px;
            padding: 80px 24px 60px;
        }
        h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 48px;
        }
        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
        }
        .field { margin-bottom: 32px; }
        input[type="text"], select {
            width: 100%;
            padding: 10px 0;
            font-size: 15px;
            font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
            background: transparent;
            border: none;
            border-bottom: 1px solid #333;
            color: #fff;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus, select:focus {
            border-bottom-color: #fff;
        }
        select {
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
        }
        select option {
            background: #111;
            color: #fff;
        }
        .urls { margin-bottom: 32px; }
        .url-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .url-row input { flex: 1; }
        .url-index {
            font-size: 12px;
            color: #555;
            font-variant-numeric: tabular-nums;
            min-width: 16px;
            text-align: right;
        }
        .btn-add {
            background: none;
            border: 1px dashed #333;
            color: #555;
            padding: 8px 0;
            width: 100%;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-add:hover { border-color: #666; color: #888; }
        .btn-remove {
            background: none;
            border: none;
            color: #333;
            font-size: 18px;
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
            transition: color 0.2s;
        }
        .btn-remove:hover { color: #888; }
        .divider {
            border: none;
            border-top: 1px solid #1a1a1a;
            margin: 40px 0;
        }
        .btn-generate {
            width: 100%;
            padding: 14px 0;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.04em;
            background: #fff;
            color: #000;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-generate:hover { opacity: 0.85; }
        .btn-generate:disabled { opacity: 0.3; cursor: not-allowed; }
        .result {
            margin-top: 48px;
            display: none;
        }
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .result-header span {
            font-size: 12px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .btn-copy {
            background: none;
            border: 1px solid #333;
            color: #888;
            padding: 4px 12px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-copy:hover { border-color: #666; color: #fff; }
        .result pre {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            padding: 20px;
            font-size: 12px;
            font-family: "SF Mono", "Fira Code", monospace;
            line-height: 1.6;
            overflow-x: auto;
            max-height: 60vh;
            overflow-y: auto;
            white-space: pre;
            color: #aaa;
        }
        .status {
            text-align: center;
            padding: 20px;
            font-size: 13px;
            color: #555;
            display: none;
        }
        .error { color: #c44; }
    </style>
</head>
<body>
    <div class="main">
        <h1>sing-box 订阅转换</h1>

        <div class="urls">
            <label>订阅链接</label>
            <div id="url-list">
                <div class="url-row">
                    <span class="url-index">1</span>
                    <input type="text" name="url" placeholder="https://" autocomplete="off">
                </div>
            </div>
            <button class="btn-add" id="btn-add" onclick="addUrlRow()">+ 添加</button>
        </div>

        <div class="field">
            <label>配置模板</label>
            <select name="template_index">
                {% for option in template_options %}
                <option value="{{ loop.index - 1 }}">{{ option }}</option>
                {% endfor %}
            </select>
        </div>

        <hr class="divider">

        <button class="btn-generate" id="btn-generate" onclick="generate()">生成配置</button>

        <div class="status" id="status">生成中...</div>
    </div>

    <script>
        let urlCount = 1;

        function addUrlRow() {
            urlCount++;
            const list = document.getElementById('url-list');
            const row = document.createElement('div');
            row.className = 'url-row';
            row.innerHTML = `
                <span class="url-index">${urlCount}</span>
                <input type="text" name="url" placeholder="https://" autocomplete="off">
                <button class="btn-remove" onclick="removeUrlRow(this)">&times;</button>
            `;
            list.appendChild(row);
        }

        function removeUrlRow(btn) {
            btn.parentElement.remove();
            reindexUrls();
        }

        function reindexUrls() {
            const rows = document.querySelectorAll('#url-list .url-row');
            urlCount = rows.length;
            rows.forEach((row, i) => {
                row.querySelector('.url-index').textContent = i + 1;
            });
        }

        function showResult(text) {
            const escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            const newDoc = `<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>配置结果</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: #000; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .main { width: 100%; max-width: 640px; padding: 80px 24px 60px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .header span { font-size: 12px; color: #555; text-transform: uppercase; letter-spacing: 0.08em; }
        .btn-back { background: none; border: 1px solid #333; color: #888; padding: 4px 12px; font-size: 11px; cursor: pointer; text-decoration: none; transition: all 0.2s; }
        .btn-back:hover { border-color: #666; color: #fff; }
        .btn-copy { background: none; border: 1px solid #333; color: #888; padding: 4px 12px; font-size: 11px; cursor: pointer; transition: all 0.2s; margin-left: 8px; }
        .btn-copy:hover { border-color: #666; color: #fff; }
        pre { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 20px; font-size: 12px; font-family: "SF Mono", "Fira Code", monospace; line-height: 1.6; overflow-x: auto; white-space: pre; color: #aaa; }
    </style>
</head>
<body>
    <div class="main">
        <div class="header">
            <span>配置结果</span>
            <div>
                <a class="btn-back" href="/">返回</a>
                <button class="btn-copy" onclick="copyResult()">复制</button>
            </div>
        </div>
        <pre id="config-text">${escaped}</pre>
    </div>
    <` + `script>
        function copyResult() {
            navigator.clipboard.writeText(document.getElementById('config-text').textContent).then(() => {
                const btn = document.querySelector('.btn-copy');
                btn.textContent = '已复制';
                setTimeout(() => { btn.textContent = '复制'; }, 1500);
            });
        }
    </` + `script>
</body>
</html>`;
            document.open();
            document.write(newDoc);
            document.close();
        }

        async function generate() {
            const urls = Array.from(document.querySelectorAll('#url-list input[name="url"]'))
                .map(input => input.value.trim())
                .filter(v => v);
            if (urls.length === 0) return;

            const templateIndex = document.querySelector('select[name="template_index"]').value;

            const subscribes = urls.map((url, i) => ({
                url: url,
                tag: "sub_" + (i + 1),
                emoji: 1,
                enabled: true
            }));

            const payload = {
                subscribes: subscribes,
                save_config_path: "./config.json"
            };

            const btn = document.getElementById('btn-generate');
            const status = document.getElementById('status');

            btn.disabled = true;
            status.style.display = 'block';
            status.className = 'status';
            status.textContent = '生成中...';

            try {
                const formData = new FormData();
                formData.append('payload', JSON.stringify(payload));
                formData.append('template_index', templateIndex);

                const response = await fetch('/generate_config', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error('生成失败');
                }

                const text = await response.text();
                showResult(text);
            } catch (e) {
                status.className = 'status error';
                status.textContent = '错误: ' + e.message;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
